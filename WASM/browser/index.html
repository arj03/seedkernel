<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SeedKernel WASM — 10k Signature Benchmark</title>
<style>
  body { font-family: monospace; max-width: 800px; margin: 2em auto; background: #111; color: #ccc; }
  h1 { color: #fff; font-size: 1.3em; }
  pre { background: #1a1a1a; padding: 1em; border-radius: 4px; overflow-x: auto; }
  .pass { color: #6c6; }
  .dim { color: #888; }
  button { font-family: monospace; padding: 0.5em 1.5em; cursor: pointer; font-size: 1em;
           background: #333; color: #ccc; border: 1px solid #555; border-radius: 3px; }
  button:hover { background: #444; }
  button:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<h1>SeedKernel WASM — 10k Signature Benchmark</h1>
<p class="dim">Loads kernel.wasm + bootstrap.wasm, builds 10k signed envelopes,
then times dispatching them through the full pipeline vs. plain Ed25519 verify.</p>
<button id="run" disabled>Loading...</button>
<pre id="log"></pre>

<script type="module">
import sodium from "./libsodium-wrappers.mjs";
import { loadKernelHost, CURRENT_VERSION }
  from "../build/host/browser.js";

const log = document.getElementById("log");
const btn = document.getElementById("run");

function print(msg, cls) {
  const span = document.createElement("span");
  if (cls) span.className = cls;
  span.textContent = msg + "\n";
  log.appendChild(span);
}

const N = 10_000;

async function runBenchmark() {
  btn.disabled = true;
  btn.textContent = "Running...";
  log.textContent = "";

  print("Loading WASM modules...");
  const mk = await loadKernelHost("../build/kernel.wasm", "../build/bootstrap.wasm", sodium);

  // Bootstrap: just the signature wrapper (README §10). The benchmark
  // registers its receiver host-side via mk.register, so no installer is
  // needed — host-side handlers carry no install record, see §3.1.
  mk.registerSignature(mk.deriveBootstrapName("signature"));

  const { publicKey: rootPk, privateKey: rootSk } = sodium.crypto_sign_keypair();
  const chatTextName = mk.deriveBootstrapName("chat.text");

  let handlerCalls = 0;
  mk.register(chatTextName, () => { handlerCalls++; });

  print(`Building ${N.toLocaleString()} signed envelopes...`);
  const wireMessages = new Array(N);
  const signatures = new Array(N);
  const payloads = new Array(N);

  for (let i = 0; i < N; i++) {
    const payloadBytes = new TextEncoder().encode(`message #${i}: hello world benchmark payload data`);
    wireMessages[i] = mk.wrapAndEncode(rootSk, rootPk, CURRENT_VERSION, chatTextName, payloadBytes);
    payloads[i] = payloadBytes;
    signatures[i] = sodium.crypto_sign_detached(payloadBytes, rootSk);
  }
  print(`Built. Wire message size: ${wireMessages[0].length} bytes\n`);

  print("Warming up (2000 messages each)...");
  for (let i = 0; i < 2000; i++) mk.dispatch(wireMessages[i % N]);
  for (let i = 0; i < 2000; i++) sodium.crypto_sign_verify_detached(signatures[i % N], payloads[i % N], rootPk);
  handlerCalls = 0;

  print(`\nBenchmark: ${N.toLocaleString()} messages\n`);
  await new Promise(r => setTimeout(r, 50));

  const t0 = performance.now();
  for (let i = 0; i < N; i++) mk.dispatch(wireMessages[i]);
  const kernelMs = performance.now() - t0;
  const kernelVerified = handlerCalls;
  handlerCalls = 0;

  await new Promise(r => setTimeout(r, 50));
  const t1 = performance.now();
  for (let i = 0; i < N; i++) sodium.crypto_sign_verify_detached(signatures[i], payloads[i], rootPk);
  const plainMs = performance.now() - t1;

  const ratio = kernelMs / plainMs;
  const kernelPerMsg = (kernelMs / N * 1000).toFixed(1);
  const plainPerMsg = (plainMs / N * 1000).toFixed(1);

  print("Method                                       Time        Per msg     Ratio", "dim");
  print("\u2500".repeat(78), "dim");
  print(`Kernel pipeline (decode+verify+dispatch)    ${kernelMs.toFixed(0).padStart(6)} ms    ${kernelPerMsg.padStart(7)} us    ${ratio.toFixed(2)}x`);
  print(`Plain Ed25519 verify only                   ${plainMs.toFixed(0).padStart(6)} ms    ${plainPerMsg.padStart(7)} us    1.00x`, "pass");
  print("");
  print(`Verified: ${kernelVerified.toLocaleString()} / ${N.toLocaleString()} messages reached handler`, "pass");
  print(`Overhead: ${((ratio - 1) * 100).toFixed(1)}% over raw verify`);

  const kSize = (await (await fetch("../build/kernel.wasm")).arrayBuffer()).byteLength;
  const bSize = (await (await fetch("../build/bootstrap.wasm")).arrayBuffer()).byteLength;
  print(`\nWASM modules: kernel.wasm (${kSize} bytes) + bootstrap.wasm (${bSize} bytes)`, "dim");

  btn.disabled = false;
  btn.textContent = "Run again";
}

btn.disabled = false;
btn.textContent = "Run benchmark";
btn.addEventListener("click", runBenchmark);
print("Ready. Click the button to start.\n", "dim");
print("Distribution: kernel-host.js + kernel.wasm + bootstrap.wasm", "dim");
print("Protocol logic (envelope format, signature wrapper, signer stack)", "dim");
print("lives in WASM. The JS host is pure glue: load modules, bridge", "dim");
print("memories, route callbacks, provide libsodium.", "dim");

</script>
</body>
</html>
